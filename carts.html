<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - UnitedMarkhor Dry_Fruits</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="carts.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body style="background-color: #f4f7f6;">
    <header class="container-fluid border border-2 d-flex justify-content-between align-items-center p-3 bg-white shadow-sm">
        <div class="logo">
            <img class="border border-3 rounded-circle" src="./mylogo.png" style="max-width: 60px;">
        </div>
        <h2 class="d-none d-md-block">UnitedMarkhor Cart</h2>
        <nav class="nav">
            <ul class="nav gap-3">
                <li><a href="index.html" class="btn btn-dark text-white">Back to Shop</a></li>
            </ul>
        </nav>
    </header>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-4">Your Shopping Cart</h1>
            <p class="text-muted">Review your items before reaching out to us on WhatsApp.</p>
        </div>

        <div id="cart-items" class="d-flex flex-wrap gap-4 justify-content-center">
            <!-- Products will be loaded here from Firestore -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>

        <div class="text-center mt-5 mb-5 p-4 bg-white rounded shadow-sm">
            <h3>Ready to Order?</h3>
            <p>Contact us on WhatsApp to finalize your purchase.</p>
            <a href="https://wa.me/yournumber" class="btn btn-success p-3 px-5 rounded-pill">
                <i class="fa-brands fa-whatsapp me-2"></i> Chat with Us
            </a>
        </div>
    </div>

    <script type="module" src="carts.js"></script>
</body>
</html>
